{% extends "base.html" %}
{% block title %}{{ t('profile_hidden_title') }} — EduQuest{% endblock %}

{% block content %}
  <div class="empty" style="padding: 4rem 2rem;">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto 1rem; color: var(--muted-foreground);">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
    </svg>
    <h3>{{ t('profile_hidden_title') }}</h3>
    <p>{{ t('profile_hidden_text').format(name=user.user_full_name) }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary" style="margin-top: 1rem;">{{ t('go_home') }}</a>
  </div>
{% endblock %}
